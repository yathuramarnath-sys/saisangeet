name: Build & Release Desktop Apps

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub Release with the .exe?"
        required: false
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"

jobs:
  build-pos-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install POS dependencies
        working-directory: apps/operations-pos
        run: npm install

      - name: Build Vite app
        working-directory: apps/operations-pos
        run: npm run build

      - name: Build Windows EXE
        working-directory: apps/operations-pos
        run: npx electron-builder build --win --x64 --publish never

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: Plato-POS-Windows
          path: |
            apps/operations-pos/electron-dist/Plato-POS-Setup.exe
            apps/operations-pos/electron-dist/latest.yml
          retention-days: 30

      - name: Read version from package.json
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./apps/operations-pos/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Delete existing release/tag (allow re-release)
        if: ${{ inputs.release == 'yes' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ steps.version.outputs.VERSION }}" --repo ${{ github.repository }} --yes 2>/dev/null || true
          git tag -d "v${{ steps.version.outputs.VERSION }}" 2>/dev/null || true
          git push origin ":refs/tags/v${{ steps.version.outputs.VERSION }}" 2>/dev/null || true

      - name: Create GitHub Release with EXE
        if: ${{ inputs.release == 'yes' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.TAG }}" \
            "apps/operations-pos/electron-dist/Plato-POS-Setup.exe" \
            "apps/operations-pos/electron-dist/latest.yml" \
            --repo ${{ github.repository }} \
            --title "Plato POS ${{ steps.version.outputs.VERSION }}" \
            --notes "### Plato POS v${{ steps.version.outputs.VERSION }}

Download **Plato-POS-Setup.exe** below and run the installer on Windows.

- Responsive layout for small POS terminal screens (1024×768 and 1024×600)
- Version badge shown prominently in topbar
- Shift close: open tables carry over automatically to next cashier
- Action bar scrolls horizontally when buttons overflow" \
            --latest

  build-kds-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install KDS dependencies
        working-directory: apps/kitchen-display
        run: npm install

      - name: Build Vite app
        working-directory: apps/kitchen-display
        run: npm run build

      - name: Build Windows EXE
        working-directory: apps/kitchen-display
        run: npx electron-builder build --win --x64 --publish never

      - name: Upload KDS Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: DineX-KDS-Windows
          path: apps/kitchen-display/electron-dist/*.exe
          retention-days: 30
