name: Deploy Owner Web Console

# Runs automatically on every push to main that touches owner-web source files
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "apps/owner-web/src/**"
      - "apps/owner-web/public/**"
      - "apps/owner-web/dist/**"
      - "apps/owner-web/index.html"
      - "apps/owner-web/package.json"
      - "apps/owner-web/vite.config.js"
      - "packages/**"
      - ".github/workflows/deploy-owner-web.yml"

jobs:
  deploy:
    name: Deploy to app.dinexpos.in
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root workspace dependencies
        run: npm install --include=optional

      - name: Build owner-web bundle
        working-directory: apps/owner-web
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.dinexpos.in/api/v1

      - name: Clear Vercel rootDirectory (one-time fix)
        run: |
          curl -s -X PATCH \
            "https://api.vercel.com/v9/projects/saisangeet-owner-web?teamId=team_kgxOuXctNQyYwnkPIIKVABFG" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory":null}' | jq '.rootDirectory // "cleared"'

      - name: Deploy dist to Vercel (app.dinexpos.in)
        working-directory: apps/owner-web
        run: |
          mkdir -p .vercel/output/static
          echo "{\"projectId\":\"${VERCEL_PROJECT_ID}\",\"orgId\":\"${VERCEL_ORG_ID}\"}" > .vercel/project.json
          echo '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' > .vercel/output/config.json
          cp -r dist/. .vercel/output/static/
          npx vercel deploy --prebuilt --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_kgxOuXctNQyYwnkPIIKVABFG
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_OWNER_WEB_PROJECT_ID }}
