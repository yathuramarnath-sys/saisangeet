<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#065f46"/>

  <!-- Chef's hat -->
  <ellipse cx="256" cy="196" rx="88" ry="72" fill="white"/>
  <rect x="180" y="196" width="152" height="60" rx="4" fill="white"/>
  <rect x="174" y="252" width="164" height="20" rx="4" fill="white" opacity="0.85"/>
  <!-- Hat top puff -->
  <circle cx="226" cy="164" r="36" fill="white"/>
  <circle cx="256" cy="156" r="40" fill="white"/>
  <circle cx="286" cy="164" r="36" fill="white"/>
  <!-- Band -->
  <rect x="176" y="248" width="160" height="20" rx="4" fill="#065f46" opacity="0.18"/>

  <!-- KDS screen / ticket -->
  <rect x="130" y="300" width="252" height="140" rx="16" fill="white" opacity="0.15"/>
  <rect x="142" y="312" width="228" height="116" rx="10" fill="white"/>

  <!-- KOT ticket lines -->
  <rect x="162" y="328" width="80" height="10" rx="5" fill="#065f46" opacity="0.7"/>
  <rect x="162" y="346" width="140" height="8" rx="4" fill="#065f46" opacity="0.35"/>
  <rect x="162" y="362" width="120" height="8" rx="4" fill="#065f46" opacity="0.35"/>
  <rect x="162" y="378" width="100" height="8" rx="4" fill="#065f46" opacity="0.35"/>

  <!-- Timer badge -->
  <circle cx="332" cy="334" r="24" fill="#10b981"/>
  <text x="332" y="342" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">12m</text>

  <!-- Flame accent -->
  <circle cx="114" cy="118" r="42" fill="#f59e0b"/>
  <text x="114" y="135" font-family="Arial, sans-serif" font-size="42" text-anchor="middle">🔥</text>
</svg>
