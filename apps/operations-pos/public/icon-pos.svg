<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1849a9"/>

  <!-- POS terminal body -->
  <rect x="136" y="100" width="240" height="200" rx="16" fill="white" opacity="0.15"/>
  <rect x="148" y="112" width="216" height="176" rx="12" fill="white"/>

  <!-- Screen display -->
  <rect x="166" y="128" width="180" height="100" rx="8" fill="#1849a9" opacity="0.08"/>
  <rect x="178" y="144" width="100" height="10" rx="5" fill="#1849a9" opacity="0.7"/>
  <rect x="178" y="162" width="70" height="8" rx="4" fill="#1849a9" opacity="0.4"/>
  <rect x="178" y="178" width="80" height="8" rx="4" fill="#1849a9" opacity="0.4"/>

  <!-- Price display -->
  <text x="330" y="218" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1849a9" text-anchor="end">₹ 850</text>

  <!-- Keypad dots -->
  <circle cx="186" cy="248" r="8" fill="#1849a9" opacity="0.4"/>
  <circle cx="214" cy="248" r="8" fill="#1849a9" opacity="0.4"/>
  <circle cx="242" cy="248" r="8" fill="#1849a9" opacity="0.4"/>
  <circle cx="270" cy="248" r="8" fill="#1849a9" opacity="0.4"/>
  <rect x="290" y="240" width="60" height="16" rx="8" fill="#1849a9" opacity="0.6"/>

  <!-- Receipt strip -->
  <rect x="228" y="288" width="56" height="76" rx="6" fill="white" opacity="0.85"/>
  <rect x="238" y="298" width="36" height="4" rx="2" fill="#1849a9" opacity="0.4"/>
  <rect x="238" y="308" width="28" height="4" rx="2" fill="#1849a9" opacity="0.3"/>
  <rect x="238" y="318" width="32" height="4" rx="2" fill="#1849a9" opacity="0.3"/>
  <rect x="238" y="332" width="36" height="8" rx="4" fill="#1849a9" opacity="0.5"/>

  <!-- Base -->
  <rect x="176" y="364" width="160" height="20" rx="10" fill="white" opacity="0.5"/>
  <rect x="216" y="380" width="80" height="12" rx="6" fill="white" opacity="0.35"/>

  <!-- Rupee badge -->
  <circle cx="394" cy="118" r="48" fill="#f59e0b"/>
  <text x="394" y="132" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">₹</text>
</svg>
